spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rpl}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rpl}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rpl}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.fail-on-empty-beans=false
server.port=8080

# CORS — set to your Vercel frontend URL in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
